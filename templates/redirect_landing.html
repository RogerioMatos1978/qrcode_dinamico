<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecionando...</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#0f172a; color:#f1f5f9;
         display:flex; align-items:center; justify-content:center; height:100vh; margin:0; text-align:center; }
  .box { max-width: 320px; }
  .spinner { width:42px; height:42px; border:4px solid #334155; border-top-color:#38bdf8; border-radius:50%;
             animation:spin 0.9s linear infinite; margin:0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { opacity:0.85; font-size:14px; }
  a.fallback { color:#38bdf8; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Redirecionando, aguarde um instante...</p>
  <p><a class="fallback" href="#" id="fallback-link" style="display:none;">Clique aqui se não for redirecionado automaticamente</a></p>
</div>

<script>
(function () {
  const slug = {{ slug|tojson }};

  function sendScanAndRedirect(locationData) {
    fetch(`/api/scan/${slug}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(locationData),
    })
      .then((r) => r.json())
      .then((data) => {
        if (data.redirect_url) {
          window.location.replace(data.redirect_url);
        } else {
          showFallback();
        }
      })
      .catch(showFallback);
  }

  function showFallback() {
    const link = document.getElementById("fallback-link");
    link.href = "/";
    link.style.display = "inline";
  }

  // Timeout de segurança: se a geolocalização demorar demais, segue sem ela.
  let resolved = false;
  const safetyTimer = setTimeout(() => {
    if (!resolved) {
      resolved = true;
      sendScanAndRedirect({ location_source: "negado" });
    }
  }, 4000);

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        if (resolved) return;
        resolved = true;
        clearTimeout(safetyTimer);
        sendScanAndRedirect({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy,
          location_source: "gps",
        });
      },
      () => {
        if (resolved) return;
        resolved = true;
        clearTimeout(safetyTimer);
        sendScanAndRedirect({ location_source: "negado" });
      },
      { enableHighAccuracy: true, timeout: 3500, maximumAge: 0 }
    );
  } else {
    resolved = true;
    clearTimeout(safetyTimer);
    sendScanAndRedirect({ location_source: "negado" });
  }
})();
</script>
</body>
</html>
